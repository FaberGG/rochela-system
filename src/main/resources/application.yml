spring:
  application:
    name: rochelasystem
  datasource:
    url: jdbc:postgresql://localhost:5432/rochela_db
    driver-class-name: org.postgresql.Driver
    username: rochela_user
    password: rochela_password
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true
  jackson:
    time-zone: America/Bogota
exportacion:
  recepcion:
    pendiente:
      enabled: false
  google:
    spreadsheet-id: 1SzgPLmy6m59KiH7tVGuU9lZkgZGVYSPs3U41xMUjHzM
    credentials-path: var/secrets/google-credentials.json
    sheets:
      rendimiento: "Materia Prima y rendimiento"
      etapas: "Etapas lote"
      recepciones: "recepciones"
      calidad-por-proveedor: ${EXPORTACION_GOOGLE_SHEET_CALIDAD_POR_PROVEEDOR:calidad_por_proveedor}
      trazabilidad-lotes: ${EXPORTACION_GOOGLE_SHEET_TRAZABILIDAD_LOTES:trazabilidad_lotes}
      produccion-etapas-completas: ${EXPORTACION_GOOGLE_SHEET_PRODUCCION_ETAPAS_COMPLETAS:produccion_etapas_completas}
      cortes-por-lote: ${EXPORTACION_GOOGLE_SHEET_CORTES_POR_LOTE:cortes_por_lote}

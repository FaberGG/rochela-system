spring:
  application:
    name: rochelasystem
  datasource:
    url: jdbc:postgresql://localhost:5432/rochela_db
    driver-class-name: org.postgresql.Driver
    username: rochela_user
    password: rochela_password
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true


version: '3.8'

services:
  postgres-rochela:
    image: postgres:15-alpine
    container_name: postgres_rochela_container
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rochela_db}
      POSTGRES_USER: ${POSTGRES_USER:-rochela_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rochela_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_rochela_data:/var/lib/postgresql/data
    restart: unless-stopped

  rochela-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rochela_api_container
    dns:
      - 8.8.8.8
      - 1.1.1.1
    depends_on:
      - postgres-rochela
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-rochela:5432/${POSTGRES_DB:-rochela_db}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-rochela_user}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-rochela_password}
      SERVER_PORT: 8080
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      CORS_ALLOWED_METHODS: ${CORS_ALLOWED_METHODS:-GET,POST,PUT,DELETE,PATCH,OPTIONS}
      CORS_ALLOWED_HEADERS: ${CORS_ALLOWED_HEADERS:-*}
      CORS_ALLOW_CREDENTIALS: ${CORS_ALLOW_CREDENTIALS:-true}
      CORS_MAX_AGE: ${CORS_MAX_AGE:-3600}
      EXPORTACION_GOOGLE_SPREADSHEET_ID: ${EXPORTACION_GOOGLE_SPREADSHEET_ID}
      EXPORTACION_GOOGLE_CREDENTIALS_BASE64: ${EXPORTACION_GOOGLE_CREDENTIALS_BASE64}
      EXPORTACION_GOOGLE_CREDENTIALS_PATH: /run/secrets/google-credentials.json
      EXPORTACION_GOOGLE_APPLICATION_NAME: ${EXPORTACION_GOOGLE_APPLICATION_NAME:-rochelasystem}
      EXPORTACION_GOOGLE_SHEET_RENDIMIENTO: ${EXPORTACION_GOOGLE_SHEET_RENDIMIENTO}
      EXPORTACION_GOOGLE_SHEET_RECEPCIONES: ${EXPORTACION_GOOGLE_SHEET_RECEPCIONES}
      EXPORTACION_GOOGLE_SHEET_ETAPAS: ${EXPORTACION_GOOGLE_SHEET_ETAPAS}
      EXPORTACION_RECEPCION_PENDIENTE_ENABLED: ${EXPORTACION_RECEPCION_PENDIENTE_ENABLED:-false}
    ports:
      - "8080:8080"
    volumes:
      - ./secrets/google-credentials.json:/run/secrets/google-credentials.json:ro
    restart: unless-stopped

volumes:
  postgres_rochela_data:
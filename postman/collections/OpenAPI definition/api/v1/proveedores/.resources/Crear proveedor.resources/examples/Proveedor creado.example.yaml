$kind: http-example
request:
  url: "{{baseUrl}}/api/v1/proveedores"
  method: POST
  headers:
    Content-Type: application/json
    Accept: "*/*"
  body:
    type: json
    content: |-
      {
        "nombreEmpresa": "Lacteos del Norte",
        "nombrePropietario": "Juan Perez",
        "nombreMayordomo": "Carlos Gomez",
        "telefono": "+57 3001234567",
        "correo": "contacto@lacteos.com",
        "direccion": "Km 5 via principal, Vereda La Isla",
        "activo": true
      }
response:
  statusCode: 201
  statusText: Created
  headers:
    Content-Type: "*/*"
  body:
    type: text
    content: |-
      {
        "id": 10,
        "nombreEmpresa": "Lacteos del Norte",
        "nombrePropietario": "Juan Perez",
        "nombreMayordomo": "Carlos Gomez",
        "telefono": "+57 3001234567",
        "correo": "contacto@lacteos.com",
        "direccion": "Km 5 via principal, Vereda La Isla",
        "activo": true
      }
order: 1000

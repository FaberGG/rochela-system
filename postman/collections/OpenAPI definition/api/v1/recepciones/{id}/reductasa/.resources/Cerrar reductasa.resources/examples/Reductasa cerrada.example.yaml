$kind: http-example
request:
  url: "{{baseUrl}}/api/v1/recepciones/:id/reductasa"
  method: PATCH
  headers:
    Content-Type: application/json
    Accept: "*/*"
  pathVariables:
    - key: id
      value: "1"
      description: Id de la recepcion
  body:
    type: json
    content: |-
      {
        "horaFinReductasa": "11:30:00"
      }
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: "*/*"
  body:
    type: text
    content: |-
      {
        "id": 1,
        "horaInicioReductasa": "09:00:00",
        "horaFinReductasa": "11:30:00",
        "tiempoReductasaMinutos": 150,
        "cumpleReductasa": true,
        "estadoRecepcion": "COMPLETA",
        "resultadoValidacion": "APTA"
      }
order: 1000

$kind: http-example
request:
  url: "{{baseUrl}}/api/v1/lotes/:id/cierre"
  method: POST
  headers:
    Content-Type: application/json
    Accept: "*/*"
  pathVariables:
    - key: id
      value: "1"
      description: Id del lote
  body:
    type: json
    content: |-
      {
        "unidadesProducidas": 250,
        "pesoTotalKg": 6714.415278758847,
        "observaciones": "Proceso estable"
      }

$kind: http-request
description: Inicia la etapa de prensado
url: "{{baseUrl}}/api/v1/lotes/:id/prensado"
method: POST
headers:
  Content-Type: application/json
  Accept: "*/*"
pathVariables:
  - key: id
    value: "1"
    description: Id del lote
body:
  type: json
  content: |-
    {
      "horaInicio": "11:30:00",
      "presionPsi": 20.0
    }
examples: ./.resources/Registrar prensado.resources/examples
order: 1000

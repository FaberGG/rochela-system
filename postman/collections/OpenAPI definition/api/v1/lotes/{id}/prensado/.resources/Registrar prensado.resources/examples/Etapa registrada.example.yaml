$kind: http-example
request:
  url: "{{baseUrl}}/api/v1/lotes/:id/prensado"
  method: POST
  headers:
    Content-Type: application/json
    Accept: "*/*"
  pathVariables:
    - key: id
      value: "1"
      description: Id del lote
  body:
    type: json
    content: |-
      {
        "horaInicio": "11:30:00",
        "horaFin": "12:00:00",
        "presionPsi": 3226.577644922668,
        "responsable": "Operario 1"
      }
response:
  statusCode: 201
  statusText: Created
  headers:
    Content-Type: "*/*"
  body:
    type: text
    content: |-
      {
        "id": 1,
        "codigoLote": "L-20260513-01",
        "producto": {
          "codigo": "QUESO-001",
          "nombre": "Queso campesino"
        },
        "fechaHoraInicio": "2026-05-13T08:30:00",
        "fechaVencimiento": "2026-06-13",
        "estadoActual": "INICIADO",
        "siguienteEtapa": "PASTEURIZACION"
      }
order: 1000

$kind: http-example
request:
  url: "{{baseUrl}}/api/v1/lotes/:id/cloruro"
  method: POST
  headers:
    Content-Type: application/json
    Accept: "*/*"
  pathVariables:
    - key: id
      value: "1"
      description: Id del lote
  body:
    type: json
    content: |-
      {
        "hora": "09:00:00",
        "temperatura": 346.84339902490314,
        "cantidadGramos": 3455.4013437523035,
        "loteCloruro": "CL-2026-05"
      }
response:
  statusCode: 409
  statusText: Conflict
  headers:
    Content-Type: "*/*"
  body:
    type: text
    content: |-
      {
        "timestamp": "2026-05-13T12:00:00",
        "status": 404,
        "error": "Not Found",
        "message": "Recurso no encontrado",
        "path": "/api/v1/lotes/99",
        "code": "RECURSO_NO_ENCONTRADO"
      }
order: 3000

$kind: http-example
request:
  url: "{{baseUrl}}/api/v1/lotes/:id/cortes"
  method: POST
  headers:
    Content-Type: application/json
    Accept: "*/*"
  pathVariables:
    - key: id
      value: "1"
      description: Id del lote
  body:
    type: json
    content: |-
      {
        "hora": "10:15:00",
        "observacion": "Corte uniforme"
      }
response:
  statusCode: 201
  statusText: Created
  headers:
    Content-Type: "*/*"
  body:
    type: text
    content: |-
      {
        "numeroCorte": 2,
        "hora": "10:15:00",
        "observacion": "Corte uniforme",
        "totalCortesRegistrados": 2
      }
order: 1000

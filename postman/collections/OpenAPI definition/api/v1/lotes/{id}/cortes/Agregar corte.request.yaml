$kind: http-request
description: Registra un nuevo corte del lote
url: "{{baseUrl}}/api/v1/lotes/:id/cortes"
method: POST
headers:
  Content-Type: application/json
  Accept: "*/*"
pathVariables:
  - key: id
    value: "1"
    description: Id del lote
body:
  type: json
  content: |-
    {
      "hora": "10:15:00",
      "observacion": "Corte uniforme"
    }
examples: ./.resources/Agregar corte.resources/examples
order: 2000

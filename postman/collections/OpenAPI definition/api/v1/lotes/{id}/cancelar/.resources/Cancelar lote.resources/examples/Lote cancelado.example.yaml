      {
        "id": 1,
        "codigoLote": "L-20260513-01",
        "producto": {
          "codigo": "QUESO-001",
          "nombre": "Queso campesino"
        },
        "fechaHoraInicio": "2026-05-13T08:30:00",
        "fechaVencimiento": "2026-06-13",
        "estadoActual": "INICIADO",
        "siguienteEtapa": "PASTEURIZACION"
      }
order: 1000

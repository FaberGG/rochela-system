$kind: http-example
request:
  url: "{{baseUrl}}/api/v1/lotes/:id/salado"
  method: POST
  headers:
    Content-Type: application/json
    Accept: "*/*"
  pathVariables:
    - key: id
      value: "1"
      description: Id del lote
  body:
    type: json
    content: |-
      {
        "hora": "11:00:00",
        "temperatura": 5383.074230659586,
        "cantidadKg": 7259.851504763513,
        "sodioInicial": 5200.521360737652,
        "sodioFinal": 2735.035852634078,
        "loteSal": "SAL-2026-05"
      }
response:
  statusCode: 201
  statusText: Created
  headers:
    Content-Type: "*/*"
  body:
    type: text
    content: |-
      {
        "id": 1,
        "codigoLote": "L-20260513-01",
        "producto": {
          "codigo": "QUESO-001",
          "nombre": "Queso campesino"
        },
        "fechaHoraInicio": "2026-05-13T08:30:00",
        "fechaVencimiento": "2026-06-13",
        "estadoActual": "INICIADO",
        "siguienteEtapa": "PASTEURIZACION"
      }
order: 1000

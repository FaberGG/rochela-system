$kind: http-example
request:
  url: "{{baseUrl}}/api/v1/lotes/:id/salado"
  method: POST
  headers:
    Content-Type: application/json
    Accept: "*/*"
  pathVariables:
    - key: id
      value: "1"
      description: Id del lote
  body:
    type: json
    content: |-
      {
        "hora": "11:00:00",
        "temperatura": 5383.074230659586,
        "cantidadKg": 7259.851504763513,
        "sodioInicial": 5200.521360737652,
        "sodioFinal": 2735.035852634078,
        "loteSal": "SAL-2026-05"
      }
response:
  statusCode: 409
  statusText: Conflict
  headers:
    Content-Type: "*/*"
  body:
    type: text
    content: |-
      {
        "timestamp": "2026-05-13T12:00:00",
        "status": 404,
        "error": "Not Found",
        "message": "Recurso no encontrado",
        "path": "/api/v1/lotes/99",
        "code": "RECURSO_NO_ENCONTRADO"
      }
order: 3000

$kind: http-example
request:
  url: "{{baseUrl}}/api/v1/productos/:codigo"
  method: GET
  headers:
    Accept: "*/*"
  pathVariables:
    - key: codigo
      value: QUESO-001
      description: Codigo del producto
response:
  statusCode: 404
  statusText: Not Found
  headers:
    Content-Type: "*/*"
  body:
    type: text
    content: |-
      {
        "timestamp": "2026-05-13T12:00:00",
        "status": 404,
        "error": "Not Found",
        "message": "Recurso no encontrado",
        "path": "/api/v1/lotes/99",
        "code": "RECURSO_NO_ENCONTRADO"
      }
order: 2000

$kind: http-request
name: Registrar lavado desuerado
url: "{{baseUrl}}/api/v1/lotes/{{loteId}}/lavado-desuerado"
method: POST
headers:
  Accept: application/json
  Content-Type: application/json
scripts:
  - type: afterResponse
    code: |-
      pm.test('status 201', function () {
        pm.response.to.have.status(201);
      });

$kind: http-request
name: Cerrar cortes
url: "{{baseUrl}}/api/v1/lotes/{{loteId}}/cortes/cerrar"
method: POST
headers:
  Accept: application/json
scripts:
  - type: afterResponse
    code: |-
      pm.test('status 200', function () {
        pm.response.to.have.status(200);
      });
    language: text/javascript
order: 8000


$kind: http-request
name: Obtener lote por id
url: "{{baseUrl}}/api/v1/lotes/{{loteId}}"
method: GET
headers:
  Accept: application/json
scripts:
  - type: afterResponse
    code: |-
      pm.test('status 200', function () {
        pm.response.to.have.status(200);
      });
    language: text/javascript
order: 3000


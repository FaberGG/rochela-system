$kind: http-request
name: Registrar corte
url: "{{baseUrl}}/api/v1/lotes/{{loteId}}/cortes"
method: POST
headers:
  Accept: application/json
  Content-Type: application/json
scripts:
  - type: afterResponse
    code: |-
      pm.test('status 201', function () {
        pm.response.to.have.status(201);
      });
    language: text/javascript
body:
  type: json
  content: |-
    {
      "hora": "10:15:00",
      "observacion": "Corte uniforme"
    }
order: 7000


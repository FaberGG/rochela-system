$kind: http-request
name: Registrar cuajo
url: "{{baseUrl}}/api/v1/lotes/{{loteId}}/cuajo"
method: POST
headers:
  Accept: application/json
  Content-Type: application/json
scripts:
  - type: afterResponse
    code: |-
      pm.test('status 201', function () {
        pm.response.to.have.status(201);
      });
    language: text/javascript
body:
  type: json
  content: |-
    {
      "hora": "09:15:00",
      "temperatura": 32.0,
      "cantidadGramos": 8.0,
      "loteCuajo": "CU-2026-05"
    }
order: 6000


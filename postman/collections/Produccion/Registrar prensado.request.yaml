$kind: http-request
name: Registrar prensado
url: "{{baseUrl}}/api/v1/lotes/{{loteId}}/prensado"
method: POST
headers:
  Accept: application/json
  Content-Type: application/json
scripts:
  - type: afterResponse
    code: |-
      pm.test('status 201', function () {
        pm.response.to.have.status(201);
      });
    language: text/javascript
body:
  type: json
  content: |-
    {
      "horaInicio": "11:30:00",
      "horaFin": "12:00:00",
      "presionPsi": 20.0,
      "responsable": "Operario 1"
    }
order: 12000


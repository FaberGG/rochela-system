$kind: http-request
name: Listar lotes de leche
url: "{{baseUrl}}/api/v1/lotes-leche"
method: GET
headers:
  Accept: application/json
queryParams:
  - key: desde
    value: "{{lotesLecheDesde}}"
    disabled: true
  - key: hasta
    value: "{{lotesLecheHasta}}"
    disabled: true
scripts:
  - type: afterResponse
    code: |-
      pm.test('status 200', function () {
        pm.response.to.have.status(200);
      });
    language: text/javascript
order: 1500


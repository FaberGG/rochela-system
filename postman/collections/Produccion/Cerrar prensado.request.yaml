$kind: http-request
name: Cerrar prensado
url: "{{baseUrl}}/api/v1/lotes/{{loteId}}/prensado/cierre"
method: POST
headers:
  Accept: application/json
  Content-Type: application/json
scripts:
  - type: afterResponse
    code: |-
      pm.test('status 200', function () {
        pm.response.to.have.status(200);
      });
    language: text/javascript
body:
  type: json
  content: |-
    {
      "horaFin": "12:00:00",
      "responsable": "Operario 1"
    }
order: 12100

